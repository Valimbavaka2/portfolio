name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : checkout du code
      - name: Checkout
        uses: actions/checkout@v4

      # Étape 2 : configuration de GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          enablement: true   # ⚡ Important pour activer Pages si le site n'existe pas encore

      # Étape 3 : upload de l’artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Ton index.html et CSS doivent être à la racine

      # Étape 4 : déploiement
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
